<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Prediction Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-6">
    <div class="bg-white p-8 rounded-lg shadow-md max-w-md w-full">
        <h1 class="text-2xl font-bold mb-6 text-gray-800 text-center">ML Model Deployment</h1>
        
        <form id="predictionForm" class="space-y-4">
            <div>
                <label for="input_data" class="block text-sm font-medium text-gray-700 mb-2">Input Data / Features</label>
                <textarea id="input_data" name="input_data" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter text or comma-separated values..."></textarea>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200">
                Predict
            </button>
        </form>

        <div id="resultContainer" class="mt-6 hidden p-4 rounded-md">
            <h3 class="font-semibold text-lg mb-1" id="resultTitle">Prediction Result</h3>
            <p class="text-gray-700">Result: <span id="predictionValue" class="font-bold"></span></p>
            <p class="text-gray-600 text-sm">Confidence: <span id="confidenceValue"></span></p>
        </div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const inputData = document.getElementById('input_data').value;
            const resultContainer = document.getElementById('resultContainer');
            const predictionValue = document.getElementById('predictionValue');
            const confidenceValue = document.getElementById('confidenceValue');

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input_data: inputData })
                });
                const data = await response.json();

                if (response.ok) {
                    resultContainer.className = "mt-6 p-4 rounded-md bg-green-100 text-green-800";
                    predictionValue.textContent = data.prediction;
                    confidenceValue.textContent = data.confidence;
                } else {
                    resultContainer.className = "mt-6 p-4 rounded-md bg-red-100 text-red-800";
                    predictionValue.textContent = "Error";
                    confidenceValue.textContent = data.error;
                }
                resultContainer.classList.remove('hidden');
            } catch (err) {
                resultContainer.className = "mt-6 p-4 rounded-md bg-red-100 text-red-800";
                predictionValue.textContent = "Network Error";
                confidenceValue.textContent = err.message;
                resultContainer.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
